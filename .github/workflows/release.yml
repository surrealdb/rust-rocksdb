name: Release

permissions:
  contents: read

on:
  workflow_dispatch:

defaults:
  run:
    shell: bash

jobs:
  run-ci:
    uses: ./.github/workflows/rust.yml

  publish-crate:
    name: Publish crate
    runs-on: ubuntu-latest
    needs: run-ci
    steps:
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # stable
        with:
          toolchain: stable

      - name: Checkout sources
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          submodules: recursive

      - name: Publish librocksdb-sys
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          cd librocksdb-sys
          VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "surrealdb-librocksdb-sys") | .version')
          BASE_VERSION=$(echo "$VERSION" | sed 's/+.*//')
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://crates.io/api/v1/crates/surrealdb-librocksdb-sys/$BASE_VERSION")
          if [ "$STATUS" = "200" ]; then
            echo "surrealdb-librocksdb-sys@$VERSION already published, skipping."
            echo "SYS_PUBLISHED=false" >> "$GITHUB_ENV"
          else
            echo "Publishing surrealdb-librocksdb-sys@$VERSION..."
            cargo publish
            echo "SYS_PUBLISHED=true" >> "$GITHUB_ENV"
          fi

      - name: Wait for crates.io to index the package
        if: env.SYS_PUBLISHED == 'true'
        run: |
          VERSION=$(cd librocksdb-sys && cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "surrealdb-librocksdb-sys") | .version')
          BASE_VERSION=$(echo "$VERSION" | sed 's/+.*//')
          echo "Waiting for surrealdb-librocksdb-sys@$VERSION to be indexed on crates.io..."
          for i in {1..30}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://crates.io/api/v1/crates/surrealdb-librocksdb-sys/$BASE_VERSION")
            if [ "$STATUS" = "200" ]; then
              echo "Package indexed on crates.io!"
              exit 0
            fi
            echo "Attempt $i/30: Not yet indexed (HTTP $STATUS), waiting 10 seconds..."
            sleep 10
          done
          echo "ERROR: Package still not indexed after 5 minutes"
          exit 1

      - name: Publish surrealdb-rocksdb
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "surrealdb-rocksdb") | .version')
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://crates.io/api/v1/crates/surrealdb-rocksdb/$VERSION")
          if [ "$STATUS" = "200" ]; then
            echo "surrealdb-rocksdb@$VERSION already published, skipping."
          else
            echo "Publishing surrealdb-rocksdb@$VERSION..."
            cargo publish
          fi