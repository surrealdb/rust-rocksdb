name: Release crate
permissions: {}
run-name: "Release crate"

on:
  workflow_dispatch:

defaults:
  run:
    shell: bash

jobs:
  # Call the rust.yml workflow first
  run-ci:
    uses: ./.github/workflows/ci.yml
    if: false

  semver:
    name: semver
    runs-on: ubuntu-latest
    needs: run-ci
    if: false  # Temporarily disabled
    steps:
      - uses: actions/checkout@v4
      - name: Check semver
        uses: obi1kenobi/cargo-semver-checks-action@v2

  publish-crate:
    name: Publish crate
    runs-on: ubuntu-latest
#    needs: [run-ci]  # REMOVED semver from this list
    steps:
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Publish crate
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          cd librocksdb-sys
          cargo publish

      - name: Wait for crates.io to index the package
        run: |
          echo "Waiting for surrealdb-librocksdb-sys to be available on crates.io..."
          for i in {1..30}; do
            if cargo search surrealdb-librocksdb-sys | grep -q "surrealdb-librocksdb-sys"; then
              echo "Package found on crates.io!"
              exit 0
            fi
            echo "Attempt $i/30: Package not yet available, waiting 10 seconds..."
            sleep 10
          done
          echo "ERROR: Package still not available after 5 minutes"
          exit 1

      - name: Publish main crate
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish